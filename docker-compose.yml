services:
    db:
        build:
            context: .
            dockerfile: Dockerfile.pg
        container_name: outbox-reader-pg
        restart: always
        environment:
            PGDATA: /var/lib/postgresql/data/pgdata
            POSTGRES_USER: root
            POSTGRES_PASSWORD: root
            POSTGRES_DB: outbox
        volumes:
            - pgdata:/var/lib/postgresql/data
            - ./pg.conf:/etc/postgresql/postgresql.conf
        ports:
            - "5432:5432"
        command: ["-c", "config_file=/etc/postgresql/postgresql.conf"]

    nats:
        image: nats:2.12.6-alpine
        container_name: outbox-reader-nats
        restart: always
        ports:
            - "4222:4222"
            - "8222:8222"
        volumes:
            - ./nats.conf:/etc/nats/nats.conf
            - jetstream:/data/jetstream
        command: ["-c", "/etc/nats/nats.conf"]
        healthcheck:
            test: ["CMD", "wget", "-qO-", "http://localhost:8222/varz"]
            interval: 5s
            timeout: 3s
            retries: 5

    nats-init:
        image: natsio/nats-box:latest
        container_name: outbox-reader-nats-init
        depends_on:
            nats:
                condition: service_healthy
        restart: "no"
        command: ["nats", "stream", "add", "TEST",
            "--server=nats://nats:4222",
            "--subjects=test.>",
            "--storage=file",
            "--retention=limits",
            "--replicas=1",
            "--discard=old",
            "--max-msgs=-1",
            "--max-bytes=-1",
            "--max-age=0",
            "--dupe-window=2m",
            "--defaults"]

    nats-box:
        image: natsio/nats-box:latest
        container_name: outbox-reader-nats-cli
        depends_on:
            - nats                                                                                      
        entrypoint: ["sleep", "infinity"] 
        environment:                                                                                    
            NATS_URL: nats://nats:4222

    outbox-reader:
        build:
            context: .
            dockerfile: packages/core/Dockerfile
        container_name: outbox-reader
        restart: on-failure
        depends_on:
            - db
            - nats
        environment:
            DATABASE_URL: postgres://root:root@db:5432/outbox
            REPLICATION_SLOT_NAME: outbox_slot
            TARGET_NATS_URL: nats://nats:4222
            PORT: "4599"
            LOG_LEVEL: info
            PROMETHEUS_PORT: "9464"
        ports:
            - "4599:4599"
            - "9464:9464"
        healthcheck:
            test: ["CMD", "wget", "-qO-", "http://localhost:4599/health"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 15s

    prometheus:
        image: prom/prometheus:v3.2.1
        container_name: outbox-reader-prometheus
        restart: always
        depends_on:
            - outbox-reader
        volumes:
            - ./prometheus.yml:/etc/prometheus/prometheus.yml
        ports:
            - "9090:9090"

volumes:
    pgdata:
    jetstream:
