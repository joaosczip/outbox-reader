services:
    db:
        build:
            context: .
            dockerfile: Dockerfile.pg
        container_name: outbox-reader-pg
        restart: always
        environment:
            PGDATA: /var/lib/postgresql/data/pgdata
            POSTGRES_USER: root
            POSTGRES_PASSWORD: root
            POSTGRES_DB: outbox
        volumes:
            - pgdata:/var/lib/postgresql/data
            - ./pg.conf:/etc/postgresql/postgresql.conf
        ports:
            - "5432:5432"
        command: ["-c", "config_file=/etc/postgresql/postgresql.conf"]

    nats:
        image: nats:2.10.25-alpine3.21
        container_name: outbox-reader-nats
        restart: always
        ports:
            - "4222:4222"
            - "8222:8222"
        volumes:
            - ./nats.conf:/etc/nats/nats.conf
            - jetstream:/data/jetstream
        command: ["-c", "/etc/nats/nats.conf"]

    outbox-reader:
        build:
            context: .
            dockerfile: packages/core/Dockerfile
        container_name: outbox-reader
        restart: on-failure
        depends_on:
            - db
            - nats
        environment:
            DATABASE_URL: postgres://root:root@db:5432/outbox
            REPLICATION_SLOT_NAME: outbox_slot
            TARGET_NATS_URL: nats://nats:4222
            PORT: "4599"
            LOG_LEVEL: info
            PROMETHEUS_PORT: "9464"
        ports:
            - "4599:4599"
            - "9464:9464"
        healthcheck:
            test: ["CMD", "wget", "-qO-", "http://localhost:4599/health"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 15s

    prometheus:
        image: prom/prometheus:v3.2.1
        container_name: outbox-reader-prometheus
        restart: always
        depends_on:
            - outbox-reader
        volumes:
            - ./prometheus.yml:/etc/prometheus/prometheus.yml
        ports:
            - "9090:9090"

volumes:
    pgdata:
    jetstream:
